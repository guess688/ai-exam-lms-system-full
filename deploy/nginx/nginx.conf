server {
    listen 80;
    server_name _;

    client_max_body_size 200m;

    root /usr/share/nginx/html;
    index index.html;

    # Root-path frontend entry.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Root-path WebSocket entry: browser /api/websocket -> backend /websocket.
    location = /api/websocket {
        proxy_pass http://backend:8080/websocket;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Root-path backend API entry.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Compatibility for clients that still connect to backend's real endpoint.
    location /websocket {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Canonicalize cloud sub-path roots so relative static assets resolve under
    # /docker-10008/ instead of /.
    location ~ ^(/docker-[0-9]+)$ {
        return 302 $1/;
    }

    # Cloud sub-path WebSocket entry:
    # /docker-10008/api/websocket -> backend /websocket.
    location ~ ^/docker-[0-9]+/api/websocket$ {
        rewrite ^/docker-[0-9]+/api/websocket$ /websocket break;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cloud sub-path API entry:
    # /docker-10008/api/foo -> backend /api/foo.
    location ~ ^/docker-[0-9]+/api(?:/.*)?$ {
        rewrite ^/docker-[0-9]+(/api(?:/.*)?)$ $1 break;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cloud sub-path frontend entry. Static assets are looked up after stripping
    # /docker-10008; page refreshes fall back to the SPA entry.
    location ~ ^/docker-[0-9]+/(.*)$ {
        rewrite ^/docker-[0-9]+/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }
}
