server {
    listen 80;
    server_name _;

    client_max_body_size 200m;

    root /usr/share/nginx/html;
    index index.html;

    # 前端访问入口：/
    # 当前 Vue Router 使用 hash 模式；仍保留刷新兜底，便于未来切换 history 模式。
    # 子路径部署如 /docker-10005 建议交给外层网关处理，项目内部优先支持根路径 /。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket 代理路径：/api/websocket
    # 浏览器通过当前域名连接 /api/websocket，Nginx 转发到后端真实端点 /websocket。
    location = /api/websocket {
        proxy_pass http://backend:8080/websocket;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 后端接口入口：/api/
    # 通过 Docker Compose 服务名 backend 访问 SpringBoot 容器，普通 HTTP API 代理保持不变。
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 兼容后端真实 WebSocket 路径：/websocket
    # 新版前端默认使用 /api/websocket，此处保留给直接访问后端路径的旧客户端。
    location /websocket {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 当前项目文件上传使用 MinIO/OSS，不在前端 Nginx 中配置 /uploads/ 作为主文件服务。
    # 如需访问 MinIO 控制台，请由 docker-compose 暴露 MinIO 端口，不通过本 Nginx 代理。
}
