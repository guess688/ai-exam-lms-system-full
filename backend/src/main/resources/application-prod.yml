server:
  port: 8080 # 允许端口号
spring:
  main:
    # 关闭banner
    banner-mode: console
    # 允许循环引用
    allow-circular-references: true
  # mysql配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:db_exam}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:exam_user}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # redis配置
#  data:
  redis:
    database: 0
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 10s
    lettuce: # Redis连接池配置
      pool:
        # 连接池最大连接数 默认8 ，负数表示没有限制
        max-active: 8
        # 连接池最大阻塞等待时间（使用负值表示没有限制） 默认-1
        max-wait: -1
        # 连接池中的最大空闲连接 默认8
        max-idle: 8
        # 连接池中的最小空闲连接 默认0
        min-idle: 0
  servlet:
    multipart:
      max-file-size: 5MB
#MybatisPlus配置
mybatis-plus:
  global-config:
    # 关闭banner
    banner: false
    db-config:
      # 逻辑删除配置
      logic-not-delete-value: 0  # 未删除值
      logic-delete-value: 1      # 已删除值
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case:
  type-aliases-package: cn.org.alan.exam.model

#jwt配置 密钥、过期时间、检查是否快到期时间
jwt:
  secret: ${JWT_SECRET:change_me_to_a_long_random_secret}
  expiration: ${JWT_EXPIRATION:1800000} # 30分钟，单位为毫秒 token过期时间
  refreshThreshold: ${JWT_REFRESH_THRESHOLD:900000}  # 15分钟，单位为毫秒 判断是否剩xx分钟过期

# 阿里云oss文件存储服务
oss:
  endpoint: ${OSS_ENDPOINT:}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:}

# Minio本地文件存储服务
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000} # 容器内部访问地址
  externalEndpoint: ${MINIO_EXTERNAL_ENDPOINT:} # 用户访问文件时使用的外部地址
  accesskey: ${MINIO_ACCESS_KEY:} # 兼容现有代码读取 minio.accesskey
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:exam-files}

# 日志配置
ai:
  provider: ${AI_PROVIDER:mock}
  baseUrl: ${AI_BASE_URL:}
  apiKey: ${AI_API_KEY:}
  model: ${AI_MODEL:}
  enabled: ${AI_ENABLED:false}
  mockEnabled: ${AI_MOCK_ENABLED:true}
  questionGeneratorServiceUrl: ${AI_QUESTION_GENERATOR_SERVICE_URL:}

logging:
  level:
    root: info
    com.example: debug

#自定义配置
online-exam:
  storage:
    type: ${ONLINE_EXAM_STORAGE_TYPE:minio} # 存储方式的配置 aliyun、minio
  login:
    captcha:
      enabled: true #是否启用验证码登录
system:
  register:
    enabled: true  # 控制是否开放注册功能
